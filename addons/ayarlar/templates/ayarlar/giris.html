<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giriş — OpenPyERP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f0f2f5; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; }
    .giris-kart { width: 380px; }
    .logo { font-size: 1.5rem; font-weight: 800; color: #0d6efd; }
  </style>
</head>
<body>
<div class="giris-kart">
  <div class="text-center mb-4">
    <div class="logo"><i class="bi bi-grid-3x3-gap-fill me-2"></i>OpenPyERP</div>
    <p class="text-muted mt-1 mb-0" style="font-size:.85rem">Açık kaynak ERP sistemi</p>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <h5 class="card-title mb-4">Giriş Yap</h5>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for kategori, mesaj in messages %}
        <div class="alert alert-{{ 'danger' if kategori == 'danger' else 'warning' }} py-2">
          <i class="bi bi-exclamation-triangle me-1"></i>{{ mesaj }}
        </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('ayarlar.giris') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        {% if request.args.get('next') %}
        <input type="hidden" name="next" value="{{ request.args.next }}">
        {% endif %}

        <div class="mb-3">
          <label class="form-label fw-semibold">E-posta</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control"
                   placeholder="ornek@sirket.com" required autofocus>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Şifre</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="sifre" class="form-control"
                   placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap
        </button>
      </form>
    </div>
  </div>

  <p class="text-center text-muted mt-3" style="font-size:.75rem">
    OpenPyERP v1.0 · Açık Kaynak
  </p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
