# alembic.ini — OpenPyERP Alembic konfigürasyonu
#
# Kullanım:
#   alembic upgrade head          → tüm migration'ları uygula
#   alembic downgrade -1          → bir adım geri al
#   alembic revision --autogenerate -m "aciklama"  → yeni migration üret
#   alembic current               → mevcut DB versiyonu
#   alembic history               → migration geçmişi

[alembic]
script_location = migrations
prepend_sys_path = .

# DB URL — ortam değişkeninden okunur (config.py ile aynı mantık)
# Üretimde: export DATABASE_URL=mysql+pymysql://user:pass@host/db
sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
