# /etc/nginx/sites-available/openpyerp
#
# Kurulum:
#   sudo cp deploy/nginx_openpyerp.conf /etc/nginx/sites-available/openpyerp
#   sudo ln -s /etc/nginx/sites-available/openpyerp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# NOT: Odoo'nun nginx konfigürasyonuna DOKUNMUYORUZ.
# Bu tamamen ayrı bir server block.

server {
    listen 80;
    server_name erp.sirketiniz.com;   # ← kendi domain'inizi yazın

    # HTTP'yi HTTPS'e yönlendir
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.sirketiniz.com;   # ← kendi domain'inizi yazın

    # SSL sertifikası — Let's Encrypt önerilir:
    # sudo certbot --nginx -d erp.sirketiniz.com
    ssl_certificate     /etc/letsencrypt/live/erp.sirketiniz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.sirketiniz.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Statik dosyalar — Nginx doğrudan servis eder (Gunicorn'a gitmez)
    location /static/ {
        alias /var/www/openpyerp/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uygulama — Gunicorn'a yönlendir
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Büyük form yüklemeleri için (PDF, Excel import)
        client_max_body_size 32M;
    }

    # Sağlık kontrolü — yük dengeleyici için
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }

    # Log dosyaları
    access_log /var/log/nginx/openpyerp_access.log;
    error_log  /var/log/nginx/openpyerp_error.log;
}
